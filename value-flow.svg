<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 1170" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-labelledby="vfs-title vfs-desc">
  <title id="vfs-title">Value chain of the self-publishing system (stacked)</title>
  <desc id="vfs-desc">Three stacked bands. One, monthly intelligence: the owner's attention and audience signals feed a psychographic profile that re-ranks a scored idea bank, with a monthly owner triage. Two, weekly production: draft in the owner's voice, a binding voice gate, the owner's approval, then publish to website, RSS, email and WhatsApp. Three, slotted distribution: LinkedIn Tuesday and X Thursday slots post only on an explicit yes; the audience compounds. A dashed feedback line returns performance data to the top. Stars mark the three human moments.</desc>
  <defs>
    <marker id="sarr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5c5c66"/>
    </marker>
    <marker id="sarrA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2f54eb"/>
    </marker>
  </defs>

  <rect width="760" height="1170" rx="14" fill="#faf9f6"/>

  <!-- BAND 1 -->
  <text x="30" y="42" font-size="14" font-weight="700" fill="#5c5c66" letter-spacing="2">1 · INTELLIGENCE — MONTHLY</text>

  <rect x="30" y="58" width="330" height="76" rx="10" fill="#ffffff" stroke="#e6e4dd"/>
  <text x="195" y="84" font-size="15" font-weight="650" fill="#15151a" text-anchor="middle">My attention</text>
  <text x="195" y="104" font-size="12.5" fill="#5c5c66" text-anchor="middle">X + LinkedIn: posts · reposts · likes ·</text>
  <text x="195" y="120" font-size="12.5" fill="#5c5c66" text-anchor="middle">bookmarks &amp; saved (privacy-safe)</text>

  <rect x="400" y="58" width="330" height="76" rx="10" fill="#ffffff" stroke="#e6e4dd"/>
  <text x="565" y="84" font-size="15" font-weight="650" fill="#15151a" text-anchor="middle">Audience signals</text>
  <text x="565" y="104" font-size="12.5" fill="#5c5c66" text-anchor="middle">site analytics · search · social</text>
  <text x="565" y="120" font-size="12.5" fill="#5c5c66" text-anchor="middle">engagement · email list</text>

  <line x1="195" y1="134" x2="330" y2="168" stroke="#5c5c66" stroke-width="1.8" marker-end="url(#sarr)"/>
  <line x1="565" y1="134" x2="430" y2="168" stroke="#5c5c66" stroke-width="1.8" marker-end="url(#sarr)"/>

  <rect x="30" y="172" width="700" height="78" rx="10" fill="#ffffff" stroke="#e6e4dd"/>
  <text x="380" y="200" font-size="15" font-weight="650" fill="#15151a" text-anchor="middle">Psychographic profile</text>
  <text x="380" y="220" font-size="12.5" fill="#5c5c66" text-anchor="middle">7 theme clusters, each with a thesis · recalibrated monthly:</text>
  <text x="380" y="236" font-size="12.5" fill="#5c5c66" text-anchor="middle">heat up · hold · cool · divergence — new themes ★gated by me</text>

  <line x1="380" y1="250" x2="380" y2="282" stroke="#5c5c66" stroke-width="1.8" marker-end="url(#sarr)"/>

  <rect x="30" y="286" width="700" height="92" rx="10" fill="#ffffff" stroke="#e6e4dd"/>
  <text x="380" y="314" font-size="15" font-weight="650" fill="#15151a" text-anchor="middle">Idea bank — scored backlog</text>
  <text x="380" y="334" font-size="12.5" fill="#5c5c66" text-anchor="middle">every idea scored: resonance · heat · edge · timeliness · ease —</text>
  <text x="380" y="350" font-size="12.5" fill="#5c5c66" text-anchor="middle">re-ranked monthly, replenished with new + exploratory ideas</text>
  <text x="380" y="370" font-size="12.5" font-weight="650" fill="#2f54eb" text-anchor="middle">★ monthly triage: my verdicts on the unreviewed tail</text>

  <!-- BAND 2 -->
  <text x="30" y="436" font-size="14" font-weight="700" fill="#5c5c66" letter-spacing="2">2 · PRODUCTION — WEEKLY</text>
  <line x1="380" y1="378" x2="380" y2="448" stroke="#5c5c66" stroke-width="1.8" marker-end="url(#sarr)"/>

  <rect x="30" y="452" width="700" height="66" rx="10" fill="#ffffff" stroke="#e6e4dd"/>
  <text x="380" y="479" font-size="15" font-weight="650" fill="#15151a" text-anchor="middle">Draft (Mon)</text>
  <text x="380" y="499" font-size="12.5" fill="#5c5c66" text-anchor="middle">top-ranked idea, written in my voice, ~800 words</text>

  <line x1="380" y1="518" x2="380" y2="548" stroke="#5c5c66" stroke-width="1.8" marker-end="url(#sarr)"/>

  <rect x="30" y="552" width="700" height="66" rx="10" fill="#ffffff" stroke="#e6e4dd"/>
  <text x="380" y="579" font-size="15" font-weight="650" fill="#15151a" text-anchor="middle">Voice gate (binding)</text>
  <text x="380" y="599" font-size="12.5" fill="#5c5c66" text-anchor="middle">12 measurable anti-AI-slop checks: pass, fix, or logged waiver</text>

  <line x1="380" y1="618" x2="380" y2="648" stroke="#5c5c66" stroke-width="1.8" marker-end="url(#sarr)"/>

  <rect x="200" y="652" width="360" height="62" rx="10" fill="#2f54eb"/>
  <text x="380" y="679" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">★ I APPROVE</text>
  <text x="380" y="699" font-size="12.5" fill="#e3e9ff" text-anchor="middle">edit · approve · skip</text>

  <line x1="380" y1="714" x2="380" y2="744" stroke="#2f54eb" stroke-width="2" marker-end="url(#sarrA)"/>

  <rect x="30" y="748" width="700" height="66" rx="10" fill="#ffffff" stroke="#e6e4dd"/>
  <text x="380" y="775" font-size="15" font-weight="650" fill="#15151a" text-anchor="middle">Publish</text>
  <text x="380" y="795" font-size="12.5" fill="#5c5c66" text-anchor="middle">website (canonical) → RSS → email → WhatsApp ping</text>

  <!-- BAND 3 -->
  <text x="30" y="872" font-size="14" font-weight="700" fill="#5c5c66" letter-spacing="2">3 · DISTRIBUTION — SLOTTED, ASK-FIRST</text>
  <line x1="195" y1="814" x2="195" y2="884" stroke="#5c5c66" stroke-width="1.8" marker-end="url(#sarr)"/>
  <line x1="565" y1="814" x2="565" y2="884" stroke="#5c5c66" stroke-width="1.8" marker-end="url(#sarr)"/>

  <rect x="30" y="888" width="330" height="84" rx="10" fill="#ffffff" stroke="#e6e4dd"/>
  <text x="195" y="914" font-size="15" font-weight="650" fill="#15151a" text-anchor="middle">LinkedIn slot — Tue 6 PM</text>
  <text x="195" y="934" font-size="12.5" fill="#5c5c66" text-anchor="middle">pings me the ready copy</text>
  <text x="195" y="954" font-size="12.5" font-weight="650" fill="#2f54eb" text-anchor="middle">★ posts only on my yes · link in comment</text>

  <rect x="400" y="888" width="330" height="84" rx="10" fill="#ffffff" stroke="#e6e4dd"/>
  <text x="565" y="914" font-size="15" font-weight="650" fill="#15151a" text-anchor="middle">X slot — Thu 6 PM</text>
  <text x="565" y="934" font-size="12.5" fill="#5c5c66" text-anchor="middle">pings me the ready long-form</text>
  <text x="565" y="954" font-size="12.5" font-weight="650" fill="#2f54eb" text-anchor="middle">★ posts only on my yes · link in reply</text>

  <line x1="195" y1="972" x2="330" y2="1006" stroke="#5c5c66" stroke-width="1.8" marker-end="url(#sarr)"/>
  <line x1="565" y1="972" x2="430" y2="1006" stroke="#5c5c66" stroke-width="1.8" marker-end="url(#sarr)"/>

  <rect x="30" y="1010" width="700" height="66" rx="10" fill="#ffffff" stroke="#e6e4dd"/>
  <text x="380" y="1037" font-size="15" font-weight="650" fill="#15151a" text-anchor="middle">Audience compounds</text>
  <text x="380" y="1057" font-size="12.5" fill="#5c5c66" text-anchor="middle">readers → followers → subscribers · search &amp; AI engines cite the canon</text>

  <!-- FEEDBACK -->
  <path d="M730,1043 C752,1043 752,96 738,96 L734,96" fill="none" stroke="#2f54eb" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#sarrA)"/>
  <text x="380" y="1100" font-size="12.5" font-weight="650" fill="#2f54eb" text-anchor="middle">the loop: performance flows back monthly → the profile recalibrates →</text>
  <text x="380" y="1118" font-size="12.5" font-weight="650" fill="#2f54eb" text-anchor="middle">ideas re-rank → the next essay is better aimed</text>

  <text x="380" y="1142" font-size="12" fill="#5c5c66" text-anchor="middle">Machines do every repeatable step.</text>
  <text x="380" y="1160" font-size="12" font-weight="700" fill="#2f54eb" text-anchor="middle">★ = the human moments: triage · approval · the yes before each post.</text>
</svg>
